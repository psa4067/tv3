name: Keep Hugging Face Spaces Awake

on:
  schedule:
    # Berjalan setiap jam pada menit ke-15
    - cron: '15 * * * *'
  workflow_dispatch: # Untuk tes manual

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Spaces via Direct URL
        run: |
          echo "Checking HF Scraper..."
          # Menggunakan Direct URL
          STATUS_SCRAPER=$(curl -s -o /dev/null -w "%{http_code}" https://rohmanbagus-my-scraper-api.hf.space)
          echo "HF Scraper Status: $STATUS_SCRAPER"
          
          echo "--------------------------------"
          
          echo "Checking Mediaflow..."
          # Menggunakan Direct URL
          STATUS_MEDIA=$(curl -s -o /dev/null -w "%{http_code}" https://rohmanbagus-nobarbae-proxy.hf.space)
          echo "Mediaflow Status: $STATUS_MEDIA"
          
          echo "--------------------------------"
          
          # Cek hasil untuk Scraper
          if [ "$STATUS_SCRAPER" -ge 200 ] && [ "$STATUS_SCRAPER" -lt 400 ]; then
            echo "✅ HF Scraper is ACTIVE (200 OK)"
          elif [ "$STATUS_SCRAPER" -eq 503 ]; then
            echo "⏳ HF Scraper is WAKING UP (Starting...)"
          else
            echo "❌ HF Scraper Error. Status: $STATUS_SCRAPER"
          fi

          # Cek hasil untuk Mediaflow
          if [ "$STATUS_MEDIA" -ge 200 ] && [ "$STATUS_MEDIA" -lt 400 ]; then
            echo "✅ Mediaflow is ACTIVE (200 OK)"
          elif [ "$STATUS_MEDIA" -eq 503 ]; then
            echo "⏳ Mediaflow is WAKING UP (Starting...)"
          else
            echo "❌ Mediaflow Error. Status: $STATUS_MEDIA"
          fi
